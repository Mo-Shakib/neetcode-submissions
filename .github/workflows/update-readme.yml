name: Update README and Landing Page

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

permissions:
  contents: write

jobs:
  update-readme-and-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update README and index page
        run: python scripts/update_readme.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet README.md index.html; then
            echo "README and index.html are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.html
          git commit -m "chore(site): update README progress and landing page"
          git push
